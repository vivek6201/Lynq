services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lynq_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/lynq_db?sslmode=disable
      - REDIS_URL=redis:6379
    command: air -c .air.toml
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    deploy:
      replicas: 2
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/lynq_db?sslmode=disable
      - REDIS_URL=redis:6379
    command: air -c .air.worker.toml
    depends_on:
      - postgres
      - redis

volumes:
  pgdata_dev:
  redisdata_dev: